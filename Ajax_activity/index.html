<!DOCTYPE html>
<html>
<head>
    <title>AJAX & PHP Demo</title>
</head>
<body>

    <h2>Register Username</h2>
    <input type="text" id="usernameInput" placeholder="Type a username..." onkeyup="checkUser(this.value)">
    
    <p id="status"></p>

    <script>
        async function checkUser(username) {
            const statusBox = document.getElementById('status');

            if (username.length < 3) {
                statusBox.innerText = "";
                return;
            }

            try {
                const response = await fetch('check_user.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'username=' + encodeURIComponent(username)
                });

                const data = await response.json();

                statusBox.innerText = data.message;
                statusBox.style.color = data.available ? 'green' : 'red';

            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>

</body>
</html>
